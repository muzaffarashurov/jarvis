app:
  name: "JARVIS"
  tagline: "Modular AI Operating System"
  version: "0.1.0-alpha"

logging:
  level: "INFO"
  retention_days: 30
  console_enabled: false

paths:
  logs: "logs"
  data_input: "data/input"
  data_output: "data/output"
  data_cache: "data/cache"
  data_database: "data/database"
  knowledge: "knowledge"
  prompts: "prompts"

orchestrator:
  skills_enabled: []

invoice:
  # Path to the existing external Invoice Automation script.
  # Jarvis only launches/monitors/stops this script; it never replaces it.
  script: "D:/Automation/InvoiceAutomation_Console_Mode_v4.2.2.py"

fast_response:
  # Existing Excel workbook Jarvis orchestrates (opens/backs up); Jarvis
  # never edits its cells directly.
  workbook: "D:/Reports/Fast Response Board.xls"
  worksheet: "July"
  backup_folder: "D:/Reports/Backup"

workflows:
  enabled: true
  auto_register: true

processes:
  auto_start: false
  dependency_check: true
  health_check_interval: 60

scheduler:
  enabled: true
  auto_start: true
  tick_interval: 1

plugins:
  enabled: true
  auto_load: true
  auto_discovery: true
  # Directory scanned by PluginDiscovery (EP-010), relative to the
  # project root. Each subdirectory is expected to contain a
  # manifest.yaml (see src/core/plugins/plugin_discovery.py for the
  # file layout). Missing directory = nothing to discover, not an error.
  plugin_directory: "plugins"