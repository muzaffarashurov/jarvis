app:
  name: "JARVIS"
  tagline: "Modular AI Operating System"
  version: "0.1.0-alpha"

logging:
  level: "INFO"
  retention_days: 30
  console_enabled: false

paths:
  logs: "logs"
  data_input: "data/input"
  data_output: "data/output"
  data_cache: "data/cache"
  data_database: "data/database"
  knowledge: "knowledge"
  prompts: "prompts"

memory:
  # EP-013.2 Memory Configuration & Persistence. Read by MemoryService
  # ('memory.*'); the Memory subsystem is disabled entirely when
  # 'enabled' is false, and stays RAM-only when 'persistent' is false.
  enabled: true
  persistent: true
  storage_file: "data/database/memory.json"
  auto_save: true
  auto_save_interval: 60
  max_entries: 10000
  default_ttl: null

orchestrator:
  skills_enabled: []

invoice:
  # Path to the existing external Invoice Automation script.
  # Jarvis only launches/monitors/stops this script; it never replaces it.
  script: "D:/Automation/InvoiceAutomation_Console_Mode_v4.2.2.py"

fast_response:
  # Existing Excel workbook Jarvis orchestrates (opens/backs up); Jarvis
  # never edits its cells directly.
  workbook: "D:/Reports/Fast Response Board.xls"
  worksheet: "July"
  backup_folder: "D:/Reports/Backup"

workflows:
  enabled: true
  auto_register: true

processes:
  auto_start: false
  dependency_check: true
  health_check_interval: 60

scheduler:
  enabled: true
  auto_start: true
  tick_interval: 1

plugins:
  enabled: true
  auto_load: true
  auto_discovery: true
  # Directory scanned by PluginDiscovery (EP-010), relative to the
  # project root. Each subdirectory is expected to contain a
  # manifest.yaml (see src/core/plugins/plugin_discovery.py for the
  # file layout). Missing directory = nothing to discover, not an error.
  plugin_directory: "plugins"

telegram:
  # EP-012 Telegram Gateway. Disabled by default -- Telegram is only an
  # external interface; the rest of Jarvis starts and runs normally
  # whether or not this section is configured.
  enabled: false
  auto_start: false
  token: ""
  allowed_chat_ids: []
  polling_interval: 2

ai:
  # EP-014 AI Provider Manager. Disabled provider selection by default
  # ("none") -- the rest of Jarvis never needs to know which provider
  # (if any) is active; see src/core/ai/provider_manager.py.
  enabled: true
  default_provider: "none"
  timeout: 120
  retry_count: 2
  max_context_messages: 20

providers:
  # EP-014 AI Provider Manager. Every provider is disabled by default;
  # this section only describes how each provider would be reached
  # once implemented -- no network requests are made by this EP.
  claude:
    # EP-015 Claude Provider. Real Anthropic API integration; never
    # print or log 'api_key'.
    enabled: false
    api_key: ""
    model: "claude-sonnet-4"
    timeout: 120
    max_tokens: 4096
    temperature: 0.2
  openai:
    enabled: false
    api_key: ""
  gemini:
    # EP-015.1 Gemini Provider. Real Google Gemini API integration;
    # never print or log 'api_key'.
    enabled: false
    api_key: ""
    model: "gemini-flash-latest"
    timeout: 120
    temperature: 0.2
    max_tokens: 4096
  ollama:
    enabled: false
    endpoint: "http://localhost:11434"
  lmstudio:
    enabled: false
    endpoint: "http://localhost:1234"